name: Build LYNX APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      # আপনার স্ক্রিনশট অনুযায়ী সঠিক পাথ
      run: chmod +x LYNX/LYNX/gradlew

    - name: Build with Gradle
      # গিটহাবকে বলছি এই ফোল্ডারের ভেতর ঢুকে বিল্ড করতে
      run: ./gradlew assembleDebug --no-daemon
      working-directory: LYNX/LYNX

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LYNX-App-Debug
        # আউটপুট APK যেখানে তৈরি হবে
        path: LYNX/LYNX/app/build/outputs/apk/debug/app-debug.apk
        
